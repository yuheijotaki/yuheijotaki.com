name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "src/**"
      - "api/**"
      - "astro.config.mjs"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "eslint.config.mjs"
      - "playwright.config.ts"
      - ".github/workflows/**"

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: "renovate"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            このプルリクエストを日本語でレビューしてください。
            リポジトリ直下の CLAUDE.md と .claude/CLAUDE.md の規約に照らして、以下を確認してください:

            - コード品質と既存実装との整合性 (Astro / TypeScript / SCSS / コンテンツコレクションのパターン)
            - 潜在的なバグ・境界条件・型安全性
            - パフォーマンス / SEO / sitemap / OG 画像生成への影響
            - アクセシビリティ (jsx-a11y / WCAG)
            - セキュリティ (XSS / 外部リンクの rel 属性 / シークレット混入)
            - コミット規約 (Conventional Commits / 9 種の type) に沿っているか

            ブランチは既にチェックアウト済みです。重要な指摘はインラインコメントで、全体サマリは PR コメントとしてまとめてください。建設的・簡潔に。

          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
